<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجموعة الداعمون</title>

<style>
body {
  margin: 0;
  font-family: "Tajawal", sans-serif;
  background: #0a0a0a;
  color: #e6e6e6;
}

header {
  padding: 40px 20px;
  text-align: center;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  border-bottom: 1px solid #22c55e;
  box-shadow: 0 0 40px #22c55e55;
}

header h1 {
  font-size: 42px;
  font-weight: bold;
  color: #22c55e;
  text-shadow: 0 0 20px #22c55eaa;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.types-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.type-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #22c55eaa;
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px #22c55e55;
  transition: 0.3s;
}

.type-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 35px #22c55eaa;
}

.type-card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid #22c55e;
}

.type-card h3 {
  color: #22c55e;
  margin-bottom: 10px;
  font-size: 22px;
}

.btn {
  display: inline-block;
  background: #22c55e;
  color: #000;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>
  <h1>مجموعة الداعمون</h1>
  <p>أنماط الإلهام والتعاطف والتواصل العميق</p>
</header>

<div class="container">

  <div class="types-grid">

    <div class="type-card">
      <img src="../avatars/INFJ.png">
      <h3>INFJ</h3>
      <a class="btn" href="INFJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/INFP.png">
      <h3>INFP</h3>
      <a class="btn" href="INFP.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ENFJ.png">
      <h3>ENFJ</h3>
      <a class="btn" href="ENFJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ENFP.png">
      <h3>ENFP</h3>
      <a class="btn" href="ENFP.html">عرض النمط</a>
    </div>

  </div>

</div>

</body>
</html>
