<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجموعة المغامرون</title>

<style>
body {
  margin: 0;
  font-family: "Tajawal", sans-serif;
  background: #0a0a0a;
  color: #e6e6e6;
}

header {
  padding: 40px 20px;
  text-align: center;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  border-bottom: 1px solid #fb923c;
  box-shadow: 0 0 40px #fb923c55;
}

header h1 {
  font-size: 42px;
  font-weight: bold;
  color: #fb923c;
  text-shadow: 0 0 20px #fb923caa;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.types-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.type-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #fb923caa;
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px #fb923c55;
  transition: 0.3s;
}

.type-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 35px #fb923caa;
}

.type-card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid #fb923c;
}

.type-card h3 {
  color: #fb923c;
  margin-bottom: 10px;
  font-size: 22px;
}

.btn {
  display: inline-block;
  background: #fb923c;
  color: #000;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #f97316;
}
</style>
</head>

<body>

<header>
  <h1>مجموعة المغامرون</h1>
  <p>أنماط الحركة والمرونة والتجربة</p>
</header>

<div class="container">

  <div class="types-grid">

    <div class="type-card">
      <img src="../avatars/ISTP.png">
      <h3>ISTP</h3>
      <a class="btn" href="ISTP.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ISFP.png">
      <h3>ISFP</h3>
      <a class="btn" href="ISFP.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ESTP.png">
      <h3>ESTP</h3>
      <a class="btn" href="ESTP.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ESFP.png">
      <h3>ESFP</h3>
      <a class="btn" href="ESFP.html">عرض النمط</a>
    </div>

  </div>

</div>

</body>
</html>
