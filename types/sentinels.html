<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجموعة المحافظون</title>

<style>
body {
  margin: 0;
  font-family: "Tajawal", sans-serif;
  background: #0a0a0a;
  color: #e6e6e6;
}

header {
  padding: 40px 20px;
  text-align: center;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  border-bottom: 1px solid #facc15;
  box-shadow: 0 0 40px #facc1555;
}

header h1 {
  font-size: 42px;
  font-weight: bold;
  color: #facc15;
  text-shadow: 0 0 20px #facc15aa;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.types-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.type-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #facc15aa;
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px #facc1555;
  transition: 0.3s;
}

.type-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 35px #facc15aa;
}

.type-card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid #facc15;
}

.type-card h3 {
  color: #facc15;
  margin-bottom: 10px;
  font-size: 22px;
}

.btn {
  display: inline-block;
  background: #facc15;
  color: #000;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #eab308;
}
</style>
</head>

<body>

<header>
  <h1>مجموعة المحافظون</h1>
  <p>أنماط التنظيم والمسؤولية والالتزام</p>
</header>

<div class="container">

  <div class="types-grid">

    <div class="type-card">
      <img src="../avatars/ISTJ.png">
      <h3>ISTJ</h3>
      <a class="btn" href="ISTJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ISFJ.png">
      <h3>ISFJ</h3>
      <a class="btn" href="ISFJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ESTJ.png">
      <h3>ESTJ</h3>
      <a class="btn" href="ESTJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ESFJ.png">
      <h3>ESFJ</h3>
      <a class="btn" href="ESFJ.html">عرض النمط</a>
    </div>

  </div>

</div>

</body>
</html>
