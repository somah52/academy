<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجموعة المحللون</title>

<style>
body {
  margin: 0;
  font-family: "Tajawal", sans-serif;
  background: #0a0a0a;
  color: #e6e6e6;
}

header {
  padding: 40px 20px;
  text-align: center;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  border-bottom: 1px solid #a855f7;
  box-shadow: 0 0 40px #a855f755;
}

header h1 {
  font-size: 42px;
  font-weight: bold;
  color: #a855f7;
  text-shadow: 0 0 20px #a855f7aa;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.types-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.type-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #a855f7aa;
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px #a855f755;
  transition: 0.3s;
}

.type-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 35px #a855f7aa;
}

.type-card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid #a855f7;
}

.type-card h3 {
  color: #a855f7;
  margin-bottom: 10px;
  font-size: 22px;
}

.btn {
  display: inline-block;
  background: #a855f7;
  color: #000;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #9333ea;
}
</style>
</head>

<body>

<header>
  <h1>مجموعة المحللون</h1>
  <p>أنماط التفكير العميق والتحليل الاستراتيجي</p>
</header>

<div class="container">

  <div class="types-grid">

    <div class="type-card">
      <img src="../avatars/INTJ.png">
      <h3>INTJ</h3>
      <a class="btn" href="INTJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/INTP.png">
      <h3>INTP</h3>
      <a class="btn" href="INTP.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ENTJ.png">
      <h3>ENTJ</h3>
      <a class="btn" href="ENTJ.html">عرض النمط</a>
    </div>

    <div class="type-card">
      <img src="../avatars/ENTP.png">
      <h3>ENTP</h3>
      <a class="btn" href="ENTP.html">عرض النمط</a>
    </div>

  </div>

</div>

</body>
</html>
